name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$GITHUB_RUN_NUMBER" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ steps.version.outputs.build_number }}
          name: Word Search v${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build_number }})
          body: |
            ## Word Search - Build ${{ steps.version.outputs.build_number }}
            
            Built from commit ${{ github.sha }}
            
            ### Installation
            Download the APK below and install on your Android device.
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
